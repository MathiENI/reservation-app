{% extends "base.html" %}

{% block content %}

<h2>Toutes les ressources</h2>

<a href="{% url 'create_resource' %}">Ajouter une ressource</a>

<ul>
    {% for r in resources %}
        <li>
            {{ r.name }}

            <a href="{% url 'update_resource' r.id %}">✏️</a>
            <a href="{% url 'delete_resource' r.id %}">❌</a>
        </li>
    {% endfor %}
</ul>

{% endblock %}
