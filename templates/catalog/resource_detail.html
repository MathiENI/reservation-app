{% extends "base.html" %}

{% block content %}

<h2>{{ resource.name }}</h2>

<ul class="card-section">
    <li class="card">
        <p>{{ resource.description }}</p>
        <p>Type : {{ resource.get_type_display }}</p>
        <p>Lieu : {{ resource.location }}</p>
        <a href="{% url 'create_reservation' resource.id %}">
            Réserver cette ressource
        </a>
        <a href="/resources/">Retour</a>
    </li>
</ul>


{% endblock %}
